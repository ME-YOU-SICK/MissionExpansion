<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mission Expansion</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Mission Expansion</p>
        <h1>Expand your knowledge web, one node at a time.</h1>
      </div>
      <div class="pill">Bottom-up learning • Retention-first</div>
    </header>

    <section id="cards" class="cards"></section>

    <section class="grid">
      <div class="panel">
        <h2>Knowledge Web</h2>
        <svg id="knowledge-web" viewBox="0 0 980 420"></svg>
      </div>
      <div class="panel" id="lesson-panel"></div>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
